workflows:
  android-build:
    name: Android Build
    environment:
      java: 11
    scripts:
      - name: Set up Android SDK
        run: echo "Android SDK is already set up by Codemagic"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Android Debug APK
        run: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      # You can add publishing steps here, e.g., to Google Play Store
      # For now, we'll just focus on building and artifact collection.
      # For example:
      # google_play:
      #   serviceAccount: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   changesNotSentForReview: true
