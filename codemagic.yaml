workflows:
  android-build:
    name: Android Build
    environment:
      java: 17 # تم التحديث إلى Java 17 لتوافق أفضل مع Gradle الحديث
    scripts:
      - name: Set up Android SDK
        script: echo "Android SDK is already set up by Codemagic"
      - name: Grant execute permission for gradlew
        script: chmod +x gradlew
      - name: Build Android Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk # تم تعديل المسار ليكون أكثر مرونة للعثور على ملف APK
